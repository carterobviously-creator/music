<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Real AI Music (Browser)</title>
<script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1/es6/core.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1/es6/music_rnn.js"></script>
<style>
body{background:#0b0f14;color:#fff;font-family:sans-serif;text-align:center;padding:40px}
button{padding:12px 20px;border:none;border-radius:8px;background:#1f6feb;color:#fff;cursor:pointer}
</style>
</head>
<body>
<h1>Real AI Music (Small Model)</h1>
<p>This runs a small AI model in your browser</p>
<button onclick="generate()">Generate</button>

<script>
let player = new mm.Player();
let rnn = new mm.MusicRNN('https://storage.googleapis.com/magentadata/js/checkpoints/music_rnn/basic_rnn');

async function generate(){
  await rnn.initialize();

  const seed = {
    notes: [{pitch:60,startTime:0,endTime:0.5}],
    totalTime:0.5
  };

  const result = await rnn.continueSequence(seed, 50, 1.2);
  player.start(result);
}
</script>
</body>
</html>
