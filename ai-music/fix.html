<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WORKING AI Music</title>
<script src="https://cdn.jsdelivr.net/npm/@magenta/music@1.23.1/dist/magentamusic.min.js"></script>
<style>
body{background:#0b0f14;color:#fff;font-family:sans-serif;text-align:center;padding:40px}
button{padding:14px 24px;border:none;border-radius:10px;background:#1f6feb;color:#fff;font-size:16px;cursor:pointer}
</style>
</head>
<body>
<h1>AI Music Generator (WORKING)</h1>
<p>This WILL generate music — first load takes ~10s</p>
<button onclick="generate()">Generate Music</button>

<script>
let player = new mm.Player();
let rnn;

async function generate(){
  if(!rnn){
    rnn = new mm.MusicRNN('https://storage.googleapis.com/magentadata/js/checkpoints/music_rnn/basic_rnn');
    await rnn.initialize();
  }

  const seed = {
    notes: [
      {pitch:60,startTime:0,endTime:0.5},
      {pitch:64,startTime:0.5,endTime:1},
      {pitch:67,startTime:1,endTime:1.5}
    ],
    totalTime:1.5
  };

  const result = await rnn.continueSequence(seed, 120, 1.1);

  player.start(result);
}
</script>
</body>
</html>
